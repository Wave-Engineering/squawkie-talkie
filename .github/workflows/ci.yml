name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request: {}
  # Backfill: build & publish a tag that was cut before the publish job existed.
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag to build & publish to GHCR (e.g. v0.6.0)"
        required: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Validate the exact code being shipped — the tag on a backfill dispatch,
          # otherwise the triggering commit (identical to checkout's default).
          ref: ${{ github.event.inputs.ref || github.sha }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - run: bun install
      - run: bun run typecheck
      - run: bun test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.sha }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - run: bun install
      - run: bun run build
      - run: bunx playwright install --with-deps chromium
      - run: bun run test:e2e

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.sha }}
      - run: docker build -t squawkie-talkie .
      - run: ./scripts/ci/docker-smoke.sh

  # Publish the container image to the org GHCR on a version tag (or a manual
  # backfill dispatch). Never runs on PRs or branch pushes. Gated behind the
  # validation jobs — which now check out the same ref — so a broken build never
  # ships an image.
  publish:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: [test, e2e, docker]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.sha }}
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/wave-engineering/squawkie-talkie
          # Bare version tag (no `v` prefix) to match the manual push + Docker/OCI
          # convention: git tag `v0.6.0` → image `0.6.0`. `latest` only on a real
          # tag push, so a backfill of an older tag never drags `latest` backward.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{version}},value=${{ github.event.inputs.ref }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=latest,enable=${{ github.event_name != 'workflow_dispatch' }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
