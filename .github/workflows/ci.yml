name: CI

on:
  push:
    branches: [main]
  pull_request: {}
  merge_group: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - run: bun install
      - run: bun run typecheck
      - run: bun test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - run: bun install
      - run: bun run build
      - run: bunx playwright install --with-deps chromium
      - run: bun run test:e2e
